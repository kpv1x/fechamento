<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#195C4B" />
    <title>Fechamento</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Fechamento</h1>
        </div>
      </header>

      <section class="summary-grid" aria-label="Totais">
        <article class="summary-card final">
          <span>Final</span>
          <strong id="finalTotal">R$ 0,00</strong>
        </article>
      </section>

      <section class="category-tabs" aria-label="Categoria">
        <button type="button" class="category-tab is-active" data-type="protege">Protege</button>
        <button type="button" class="category-tab" data-type="saidas">Sa&iacute;das</button>
        <button type="button" class="category-tab" data-type="entradas">Entradas</button>
      </section>

      <form class="entry-panel" id="entryForm">
        <div class="amount-group">
          <label for="amountInput" id="amountLabel">Valor em Protege</label>
          <div class="amount-input">
            <span>R$</span>
            <input id="amountInput" name="amount" inputmode="decimal" enterkeyhint="done" autocomplete="off" placeholder="0,00" />
          </div>
        </div>

        <div class="field-row">
          <label for="noteInput">Observa&ccedil;&atilde;o</label>
          <input id="noteInput" name="note" type="text" maxlength="80" placeholder="Opcional" />
        </div>

        <button class="primary-button" type="submit">Lan&ccedil;ar</button>
      </form>

      <section class="history-section" aria-label="Lancamentos">
        <div class="section-heading">
          <h2 id="historyTitle">Protege de hoje</h2>
          <button id="clearDayButton" class="text-button" type="button">Limpar dia</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <p class="privacy-note">Os lan&ccedil;amentos ficam salvos apenas neste aparelho durante o dia.</p>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js" defer></script>
  </body>
</html>
